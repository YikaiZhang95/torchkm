name: CUDA tests

# CUDA test job. Runs on a self-hosted runner labelled with both
# ``self-hosted`` and ``cuda``. The workflow stays parked (and the job
# stays unscheduled) until such a runner is registered against the
# repository — see ``docs/developer/cuda_testing.md`` for the manual
# protocol that is currently the authoritative GPU coverage record.

on:
  workflow_dispatch:
    inputs:
      ref:
        description: Git ref (branch / SHA / tag) to test
        type: string
        required: false
        default: ""
  schedule:
    # Weekly Monday 07:00 UTC. Cron is non-binding when no runner is
    # available — GitHub queues the run for up to 24h and then drops it.
    - cron: "0 7 * * 1"

permissions:
  contents: read

jobs:
  cuda-tests:
    name: pytest -m cuda on self-hosted GPU
    # Job is skipped when the user's fork has no labelled self-hosted
    # runner; that's the desired behaviour.
    runs-on: [self-hosted, linux, cuda]
    timeout-minutes: 60

    steps:
      - name: Check out repository
        uses: actions/checkout@v4
        with:
          ref: ${{ inputs.ref || github.ref }}

      - name: Report runner environment
        run: |
          set -e
          echo "::group::Runner environment"
          uname -a
          python --version
          nvidia-smi
          echo "::endgroup::"

      - name: Install package and dev dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,examples,viz]"

      - name: Confirm CUDA is visible to PyTorch
        run: |
          python - <<'PY'
          import torch
          assert torch.cuda.is_available(), "CUDA is not visible to PyTorch on this runner"
          print("torch:", torch.__version__)
          print("CUDA build:", torch.version.cuda)
          print("device count:", torch.cuda.device_count())
          print("device 0:", torch.cuda.get_device_name(0))
          PY

      - name: Run full test suite under CUDA
        run: |
          mkdir -p artifacts
          python -m pytest -q \
            --cov=torchkm \
            --cov-report=term-missing:skip-covered \
            --cov-report=xml:artifacts/coverage-cuda.xml \
            --junitxml=artifacts/junit-cuda.xml \
            2>&1 | tee artifacts/cuda-test-output.log

      - name: Run CUDA-marked tests with detail
        if: always()
        run: |
          python -m pytest -m cuda -v 2>&1 \
            | tee artifacts/cuda-marked-tests.log

      - name: Snapshot environment for archive
        if: always()
        run: |
          {
            echo "## Runner snapshot"
            echo "Date: $(date -u +%Y-%m-%dT%H:%M:%SZ)"
            echo "Git commit: $(git rev-parse HEAD)"
            echo "Git ref: ${{ inputs.ref || github.ref }}"
            echo
            echo "### nvidia-smi"
            nvidia-smi || true
            echo
            echo "### pip freeze"
            python -m pip freeze
          } > artifacts/runner-snapshot.txt

      - name: Upload CUDA test artifacts
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: cuda-test-artifacts-${{ github.run_id }}
          path: artifacts/
          retention-days: 90
