name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v6

      - name: Set up Python
        uses: actions/setup-python@v6
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,sklearn,viz]"
          python -m pip install pytest pytest-cov black flake8

      - name: Check formatting
        if: matrix.python-version == '3.11'
        run: |
          python -m black --check .

      - name: Lint
        if: matrix.python-version == '3.11'
        run: |
          python -m flake8 torchkm tests --max-line-length=88 --extend-ignore=E203,W503

      - name: Run tests with coverage
        run: |
          python -m pytest -q --cov=torchkm --cov-report=term-missing --cov-report=xml

      - name: Install documentation dependencies
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install mkdocs mkdocs-material "mkdocstrings[python]"

      - name: Build documentation
        if: matrix.python-version == '3.11'
        run: |
          mkdocs build --strict

      - name: Upload coverage artifact
        uses: actions/upload-artifact@v7
        with:
          name: coverage-xml-${{ matrix.python-version }}
          path: coverage.xml
