name: Tests

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    strategy:
      fail-fast: false
      matrix:
        python-version: ["3.10", "3.11", "3.12"]

    steps:
      - name: Check out repository
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: ${{ matrix.python-version }}
          cache: pip

      - name: Install package and test dependencies
        run: |
          python -m pip install --upgrade pip
          python -m pip install -e ".[dev,examples,viz]"

      - name: Check formatting
        if: matrix.python-version == '3.11'
        run: |
          python -m black --check .

      - name: Lint
        if: matrix.python-version == '3.11'
        run: |
          python -m flake8 torchkm tests

      - name: Run tests
        if: matrix.python-version != '3.11'
        run: |
          python -m pytest -q

      - name: Run tests with coverage
        if: matrix.python-version == '3.11'
        run: |
          python -m pytest -q --cov=torchkm --cov-report=term-missing:skip-covered --cov-report=xml --cov-report=html --cov-fail-under=90 | tee coverage-summary.txt

      - name: Install documentation dependencies
        if: matrix.python-version == '3.11'
        run: |
          python -m pip install mkdocs mkdocs-material "mkdocstrings[python]"

      - name: Build documentation
        if: matrix.python-version == '3.11'
        run: |
          mkdocs build --strict

      - name: Add coverage summary
        if: matrix.python-version == '3.11'
        run: |
          {
            echo "## Coverage summary"
            echo '```'
            cat coverage-summary.txt
            echo '```'
          } >> "$GITHUB_STEP_SUMMARY"

      - name: Upload coverage artifacts
        if: matrix.python-version == '3.11'
        uses: actions/upload-artifact@v4
        with:
          name: coverage-report-${{ matrix.python-version }}
          path: |
            coverage.xml
            htmlcov/
